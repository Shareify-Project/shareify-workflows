name: Reusable SAST Scan
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_ORGANIZATION:
        required: true
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      RECEIVER_MAIL:
        required: true

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}

      - name: Send Email on Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ STAGE 1 PASSED: SonarCloud Scan Successful"
          to: ${{ secrets.RECEIVER_MAIL }}
          from: "Shareify CI/CD"
          body: |
            Great news! The SonarCloud scan for ${{ github.repository }} has passed.
            
            Stage 1: SAST - COMPLETED
            Proceeding to Stage 2: SCA Scanning.
            
            Organization: ${{ secrets.SONAR_ORGANIZATION }}
            Project: ${{ github.repository_owner }}_${{ github.event.repository.name }}
            Dashboard: https://sonarcloud.io/project/overview?id=${{ github.repository_owner }}_${{ github.event.repository.name }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ STAGE 1 FAILED: SonarCloud Scan Vulnerabilities Found"
          to: ${{ secrets.RECEIVER_MAIL }}
          from: "Shareify CI/CD"
          body: |
            Critical! The SonarCloud scan for ${{ github.repository }} has failed.
            The pipeline has been stopped.
            
            Please check the SonarCloud dashboard for details: https://sonarcloud.io/project/overview?id=${{ github.repository_owner }}_${{ github.event.repository.name }}