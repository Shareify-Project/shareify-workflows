name: Reusable Build and Push
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    secrets:
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      RECEIVER_MAIL:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }} .
          docker tag ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push to GHCR
        if: success()
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI Pipeline Failed: ${{ github.repository }}"
          to: ${{ secrets.RECEIVER_MAIL }}
          from: "Shareify CI/CD"
          body: |
            The CI pipeline for ${{ github.repository }} has failed during the build or scan phase.
            
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            Please check the logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
