name: Reusable Build and Push
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    secrets:
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      RECEIVER_MAIL:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        id: repo_owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}:${{ github.sha }} .
          docker tag ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}:${{ github.sha }} ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL' # Only fail on CRITICAL now

      - name: Push to GHCR
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}:latest

      - name: Send Email on Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 STAGE 3 PASSED: Image Pushed to GHCR"
          to: ${{ secrets.RECEIVER_MAIL }}
          from: "Shareify CI/CD"
          body: |
            Success! The Docker image for ${{ github.repository }} has been built and pushed.
            
            Stage 3: Build & Scan - COMPLETED (High vulnerabilities ignored, Critical checked)
            
            Registry: ghcr.io/${{ env.OWNER_LC }}/${{ inputs.image_name }}
            Tag: ${{ github.sha }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ STAGE 3 FAILED: Build or Trivy Scan Failed"
          to: ${{ secrets.RECEIVER_MAIL }}
          from: "Shareify CI/CD"
          body: |
            Critical! The Docker Build or Trivy security scan for ${{ github.repository }} has failed.
            No image was pushed to the registry.
